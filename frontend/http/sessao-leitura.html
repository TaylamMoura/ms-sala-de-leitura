<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="img/favicon.png" type="image/x-icon">
    <title>Sessão de Leitura | Sala de Leitura</title>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'leitura-creme': '#FDFCF9',
                        'leitura-verde': '#638C6D',
                        'leitura-verde-escuro': '#4A6952',
                        'leitura-verde-claro': '#E0E5B6',
                        'leitura-laranja': '#C84C05',
                    },
                    fontFamily: {
                        'titulo': ['"Special Elite"', 'system-ui'],
                        'mono': ['"Cutive Mono"', 'monospace'],
                        'principal': ['"Courier Prime"', 'serif'],
                        'livro': ['"Tenor Sans"', 'serif'],
                        'botao': ['"Source Code Pro"', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style type="text/css">
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Cutive+Mono&family=Courier+Prime:wght@400;700&family=Tenor+Sans&family=Source+Code+Pro:wght@400;700&display=swap');

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* ANIMAÇÃO DAS GOTAS */
        .blob-verde {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 140, 109, 0.7) 0%, rgba(99, 140, 109, 0) 90%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(10px);
            animation: tinta-aleatoria-verde 30s infinite ease-out;
        }

        .blob-laranja {
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(200, 76, 5, 0.5) 0%, rgba(200, 76, 5, 0) 90%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(15px);
            animation: tinta-aleatoria-laranja 35s infinite ease-out;
        }

        @keyframes tinta-aleatoria-verde {
            0%, 100% { top: -10%; left: -5%; transform: scale(0.1); opacity: 0; }
            20% { opacity: 0.8; transform: scale(1.2); }
            45% { top: 70%; left: 15%; transform: scale(0.1); opacity: 0; }
            65% { opacity: 0.7; transform: scale(1.5); }
            85% { top: 20%; left: 60%; transform: scale(0.1); opacity: 0; }
        }

        @keyframes tinta-aleatoria-laranja {
            0%, 100% { bottom: -5%; right: -5%; transform: scale(0.1); opacity: 0; }
            25% { opacity: 0.6; transform: scale(1.4); }
            50% { bottom: 65%; right: 30%; transform: scale(0.1); opacity: 0; }
            75% { opacity: 0.7; transform: scale(1.2); }
        }
    </style>
</head>

<body class="bg-leitura-creme min-h-screen font-principal text-gray-800 flex flex-col relative overflow-hidden">

<div class="blob-verde"></div>
<div class="blob-laranja"></div>

<header class="bg-white/80 backdrop-blur-md border-b border-gray-200 px-8 py-4 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-3">
        <img src="img/logotipo.png" alt="logotipo" class="w-10 h-10 rounded-full object-cover">
        <h2 class="font-titulo text-xl text-gray-900 leading-none">Sala de Leitura</h2>
    </div>
    <a href="#" onclick="voltarParaDetalhes(event)" class="group flex items-center gap-2 font-mono text-sm hover:text-leitura-verde transition-colors">
        <img src="img/arrow_back.png" alt="Voltar" class="w-5 h-5 group-hover:-translate-x-1 transition-transform opacity-70">
        Voltar
    </a>
</header>

<main class="flex-1 flex flex-col items-center justify-center p-6 gap-10 relative z-10">
    <div class="relative">
        <div class="absolute -inset-4 bg-leitura-verde/20 rounded-full blur-2xl opacity-50"></div>
        <img id="capaLivro" src="https://via.placeholder.com/300x450?text=Carregando..." alt="Capa do Livro"
             class="relative w-36 md:w-44 rounded-lg shadow-2xl border-[3px] border-white object-cover aspect-[2/3]">
    </div>

    <div class="text-center space-y-8 max-w-[340px] w-full">
        <div class="space-y-1">
            <p class="font-mono text-[10px] uppercase tracking-[0.4em] text-leitura-verde font-bold">Cronômetro</p>
            <h1 id="cronometro" class="text-7xl font-bold tracking-tighter text-gray-900 font-mono drop-shadow-sm">00:00</h1>
        </div>

        <div class="flex items-center justify-center gap-6">
            <button id="iniciarSessao" onclick="iniciarSessao()" class="hover:scale-110 hover:bg-leitura-laranja transition-all bg-leitura-verde p-4 rounded-full shadow-lg">
                <img src="img/Play circle.png" class="w-8 h-8 invert">
            </button>

            <button id="pausarSessao" onclick="pausarSessao()" class="hidden group hover:scale-110 hover:bg-leitura-laranja transition-all bg-white p-4 rounded-full border border-gray-200 shadow-sm">
                <img src="img/Pause circle.png" class="w-7 h-7 opacity-40 group-hover:invert group-hover:opacity-100">
            </button>

            <button id="finalizarSessao" onclick="finalizarSessao()" class="hover:scale-110 hover:bg-leitura-laranja transition-all bg-leitura-verde-escuro p-4 rounded-full shadow-lg">
                <img src="img/Stop circle.png" class="w-8 h-8 invert">
            </button>
        </div>

    </div>
</main>

<!-- MODAL CENTRALIZADO -->
<div id="modal-paginas" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[99999] flex items-center justify-center" aria-hidden="true">
    <div class="bg-leitura-creme w-[90%] max-w-xs rounded-[2.5rem] shadow-2xl border border-white p-8 relative">
        <button onclick="fecharModal()" class="absolute top-4 right-6 text-gray-400 hover:text-leitura-laranja text-2xl font-bold">&times;</button>

        <div class="text-center space-y-6">
            <div class="space-y-2">
                <div class="bg-leitura-verde-claro/40 w-12 h-12 rounded-full flex items-center justify-center mx-auto">
                    <img src="img/Book open.png" class="w-6 h-6 opacity-70">
                </div>
                <h3 class="font-livro text-xl text-gray-900 font-bold">Página atual</h3>
                <p class="font-mono text-[12px] uppercase tracking-widest text-gray-500">Onde você parou?</p>
            </div>

            <input type="number" id="inputPaginas" placeholder="000"
                   class="w-full bg-transparent border-b-2 border-leitura-verde/40 py-2 text-center text-4xl font-bold outline-none text-gray-900">

            <button onclick="enviarSessaoLeitura()"
                    class="w-full bg-leitura-verde text-white font-bold text-[16px] py-4 rounded-xl hover:bg-leitura-laranja shadow-md uppercase tracking-widest transition-all">
                Salvar Progresso
            </button>
        </div>
    </div>
</div>

<script>
    function abrirModal() {
    const modal = document.getElementById("modal-paginas");
    modal.classList.remove("hidden");
    modal.setAttribute("aria-hidden", "false");
  }
  function fecharModal() {
    const modal = document.getElementById("modal-paginas");
    modal.classList.add("hidden");
    modal.setAttribute("aria-hidden", "true");
  }
</script>

<script src="js/sessaoLeitura.js"></script>
