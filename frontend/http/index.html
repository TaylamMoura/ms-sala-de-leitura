<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/favicon.png" type="image/x-icon">
    <title>Sala de Leitura - Entrar</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'leitura-fundo': '#638C6D',
                        'leitura-modal': '#E0E5B6',
                        'leitura-botao': '#638C6D',
                        'leitura-hover': '#C84C05',
                        'leitura-cinza': '#E5E7EB', // Cinza mais presente (Gray 200)
                        'texto-forte': '#111827',   // Quase preto para o slogan
                    },
                    fontFamily: {
                        'titulo': ['"Special Elite"', 'system-ui'],
                        'texto': ['"Cutive Mono"', 'monospace'],
                        'principal': ['"Courier Prime"', 'serif'],
                        'botao': ['"Source Code Pro"', 'monospace'],
                    },
                    gridTemplateColumns: {
                        'mosaico': 'repeat(auto-fill, minmax(130px, 1fr))',
                    }
                }
            }
        }
    </script>

    <style type="text/css">
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Cutive+Mono&family=Courier+Prime:wght@400;700&family=Source+Code+Pro:wght@400;700&display=swap');

        .linha-separadora {
            width: 1px;
            height: 180px;
            background-color: rgba(0, 0, 0, 0.15);
        }

        /* Corrigindo a centralização do Modal */
        #formulario-login {
            display: none; /* JS vai mudar para 'flex' */
        }

        body::-webkit-scrollbar { display: none; }

        /* Efeito Tijolinho */
        #fundo-mosaico img:nth-child(even) {
            transform: translateY(25px);
        }
    </style>
</head>

<body class="min-h-screen font-principal relative bg-leitura-cinza overflow-hidden flex items-center justify-center">

<div id="fundo-mosaico" class="absolute inset-0 z-0 grid grid-cols-mosaico gap-6 p-4 opacity-90 saturate-[0.8] blur-none">
</div>

<div class="absolute inset-0 z-10 bg-gradient-to-b from-leitura-cinza/80 via-leitura-cinza/60 to-leitura-cinza/90"></div>

<div class="relative z-20 w-full max-w-3xl px-6 py-8 flex flex-col items-center">

    <main class="w-full bg-white/60 backdrop-blur-md border border-white p-10 md:p-14 rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.08)]
             animate-in fade-in zoom-in duration-700 flex flex-col items-center">

        <header class="flex flex-row items-center justify-center gap-5 mb-14 text-left">
            <img id="logotipo" src="./img/logotipo.png" alt="logotipo"
                 class="w-14 h-14 md:w-16 md:h-16 rounded-full object-cover border-2 border-black/5 shadow-md">

            <div class="flex flex-col">
                <h1 class="font-titulo text-3xl md:text-4xl text-gray-900 tracking-tight leading-none">
                    Sala de Leitura
                </h1>
                <h2 class="font-texto text-[8px] md:text-xs font-bold mt-1 text-texto-forte uppercase tracking-widest opacity-80">
                    Sua aplicação para registrar leituras e estimular seu foco.
                </h2>
            </div>
        </header>

        <div class="w-full flex flex-col md:flex-row items-center justify-center gap-16 md:gap-32">

            <section class="text-center flex flex-col items-center">
                <h3 class="text-3xl font-light mb-6 text-gray-800">Entrar</h3>
                <button onclick="abrirFormularioLogin()" class="w-44 h-14 bg-leitura-botao text-white hover:bg-leitura-hover transition-all duration-500 rounded-xl shadow-lg font-botao text-xl active:scale-95">
                    Login
                </button>
            </section>

            <section class="text-center flex flex-col items-center">
                <h3 class="text-3xl font-light mb-6 text-gray-800">Junte-se a nós</h3>
                <a href="./cadastro.html" class="inline-flex items-center justify-center w-44 h-14 border-2 border-leitura-botao text-leitura-botao hover:bg-leitura-botao hover:text-white transition-all duration-500 rounded-xl font-botao text-xl active:scale-95">
                    Cadastre-se
                </a>
            </section>
        </div>
    </main>

<div id="formulario-login" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">

    <div class="bg-leitura-modal w-full max-w-md p-10 rounded-[2.5rem] shadow-2xl relative animate-in fade-in zoom-in duration-300 mx-auto my-auto">
        <span class="absolute top-6 right-8 text-4xl font-light cursor-pointer hover:text-red-600 transition-colors" onclick="fecharFormularioLogin()">&times;</span>

        <h3 class="text-4xl mb-10 text-center font-light">Login</h3>

        <form id="formLogin" onsubmit="fazerLogin(event);" class="space-y-6">
            <div class="space-y-2">
                <label for="inputLogin" class="font-bold text-sm uppercase tracking-widest opacity-80 px-1 text-gray-900">Email</label>
                <input type="text" id="inputLogin" placeholder="seu@email.com"
                       class="w-full p-4 rounded-xl border-none focus:ring-4 focus:ring-leitura-fundo/30 outline-none transition-all bg-white/90 shadow-sm">
            </div>

            <div class="space-y-2">
                <label for="inputSenha" class="font-bold text-sm uppercase tracking-widest opacity-80 px-1 text-gray-900">Senha</label>
                <input type="password" id="inputSenha" placeholder="••••••••"
                       class="w-full p-4 rounded-xl border-none focus:ring-4 focus:ring-leitura-fundo/30 outline-none transition-all bg-white/90 shadow-sm">
            </div>

            <div class="flex flex-col gap-4 mt-10">
                <button type="submit" class="bg-leitura-fundo text-leitura-creme p-5 rounded-xl font-botao text-xl hover:bg-leitura-hover transition-all shadow-lg active:scale-95">
                    Entrar na Sala
                </button>

            </div>
        </form>
    </div>
</div>

<script>
    const fundoMosaico = document.getElementById('fundo-mosaico');
    const totalCapas = 66;
    const repeticoes = 6;

    let listaCapas = Array.from({ length: totalCapas }, (_, i) => i + 1);

    // 2. Função para embaralhar a lista (Algoritmo Fisher-Yates)
    function embaralhar(lista) {
        for (let i = lista.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [lista[i], lista[j]] = [lista[j], lista[i]];
        }
        return lista;
    }

    // 3. Geramos o mosaico com a ordem aleatória
    for (let i = 0; i < repeticoes; i++) {
        // Embaralhamos a lista a cada repetição para ficar bem randômico
        const capasAleatorias = embaralhar([...listaCapas]);

        capasAleatorias.forEach(numero => {
            const img = document.createElement('img');
            img.src = `./img/wallpapers/capa${numero}.jpg`;
            img.className = "w-full aspect-[2/3] object-cover rounded-xl shadow-md grayscale-[15%] hover:grayscale-0 transition-all duration-700 hover:scale-110 hover:z-30 relative";
            img.alt = `Capa de livro ${numero}`;
            fundoMosaico.appendChild(img);
        });
    }
</script>

<script src="js/index.js"></script>
</body>
</html>
