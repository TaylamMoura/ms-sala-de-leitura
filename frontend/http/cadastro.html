<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./img/favicon.png" type="image/x-icon">
    <title>Sala de Leitura | Cadastro</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'leitura-fundo': '#638C6D',
                        'leitura-modal': '#E0E5B6', // Seu verde de cadastro
                        'leitura-botao': '#638C6D',
                        'leitura-hover': '#C84C05',
                        'leitura-cinza': '#E5E7EB',
                        'texto-forte': '#111827',
                    },
                    fontFamily: {
                        'titulo': ['"Special Elite"', 'system-ui'],
                        'texto': ['"Cutive Mono"', 'monospace'],
                        'principal': ['"Courier Prime"', 'serif'],
                        'botao': ['"Source Code Pro"', 'monospace'],
                    },
                    gridTemplateColumns: {
                        'mosaico': 'repeat(auto-fill, minmax(130px, 1fr))',
                    }
                }
            }
        }
    </script>

    <style type="text/css">
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Cutive+Mono&family=Courier+Prime:wght@400;700&family=Source+Code+Pro:wght@400;700&display=swap');

        body::-webkit-scrollbar { display: none; }

        /* Efeito Tijolinho para manter o padrão */
        #fundo-mosaico img:nth-child(even) {
            transform: translateY(25px);
        }
    </style>
</head>

<body class="min-h-screen font-principal relative bg-leitura-cinza overflow-hidden flex items-center justify-center p-4">

<div id="fundo-mosaico" class="absolute inset-0 z-0 grid grid-cols-mosaico gap-6 p-4 opacity-90 saturate-[0.8] blur-none">
</div>

<div class="absolute inset-0 z-10 bg-gradient-to-b from-leitura-cinza/80 via-leitura-cinza/60 to-leitura-cinza/90"></div>

<a href="./index.html" class="absolute top-8 left-8 z-30 bg-white/50 hover:bg-white p-3 rounded-full transition-all shadow-lg active:scale-90">
    <img src="./img/arrow_back.png" alt="Voltar" class="w-8 h-8">
</a>

<div class="relative z-20 w-full max-w-2xl flex flex-col items-center">

    <main class="w-full bg-leitura-modal/95 backdrop-blur-md p-8 md:p-12 rounded-[2.5rem] shadow-2xl animate-in fade-in zoom-in duration-700 border border-white/20">

        <header class="flex flex-col items-center gap-2 mb-10 text-center">
            <h1 class="font-titulo text-4xl text-gray-900 drop-shadow-sm">Cadastro</h1>
            <p class="font-texto text-sm text-texto-forte uppercase tracking-widest opacity-80">Crie sua conta na Sala de Leitura</p>
            <div class="w-24 h-1 bg-leitura-fundo/30 mt-2 rounded-full"></div> </header>

        <form id="formCadastro" action="/usuarios" method="POST" class="space-y-5">
            <div class="space-y-1">
                <label for="inputNome" class="block font-bold text-gray-800 text-sm uppercase">Nome:</label>
                <input type="text" id="inputNome" name="nome" placeholder="Nome e Sobrenome" required
                       class="w-full p-3 rounded-xl border-none shadow-sm focus:ring-4 focus:ring-leitura-fundo/30 outline-none transition-all">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="space-y-1">
                    <label for="inputDataNasc" class="block font-bold text-gray-800 text-sm uppercase">Nascimento:</label>
                    <input type="date" id="inputDataNasc" name="dataNascimento" required
                           class="w-full p-3 rounded-xl border-none shadow-sm focus:ring-4 focus:ring-leitura-fundo/30 outline-none transition-all">
                </div>

                <div class="space-y-1">
                    <label for="inputEmail" class="block font-bold text-gray-800 text-sm uppercase">Email:</label>
                    <input type="email" id="inputEmail" name="email" placeholder="seu@email.com" required
                           class="w-full p-3 rounded-xl border-none shadow-sm focus:ring-4 focus:ring-leitura-fundo/30 outline-none transition-all">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="space-y-1">
                    <label for="inputSenha" class="block font-bold text-gray-800 text-sm uppercase">Senha:</label>
                    <input type="password" id="inputSenha" name="senha" placeholder="Mínimo 8 caracteres" minlength="8" required
                           class="w-full p-3 rounded-xl border-none shadow-sm focus:ring-4 focus:ring-leitura-fundo/30 outline-none transition-all">
                </div>

                <div class="space-y-1">
                    <label for="inputConfirmarSenha" class="block font-bold text-gray-800 text-sm uppercase">Confirmar Senha:</label>
                    <input type="password" id="inputConfirmarSenha" name="confirmarSenha" placeholder="Repita a senha" required
                           class="w-full p-3 rounded-xl border-none shadow-sm focus:ring-4 focus:ring-leitura-fundo/30 outline-none transition-all">
                </div>
            </div>

            <button type="submit" class="w-full mt-4 bg-leitura-botao text-white p-4 rounded-xl font-botao text-xl hover:bg-leitura-hover shadow-lg transition-all active:scale-95">
                Finalizar Cadastro
            </button>
        </form>
    </main>
</div>

<script>

    //Cria um fundo infinito de capas: embaralha as imagens disponíveis e as repete para preencher o mosaico visual.
    //--------------------------------------------------------------------------------------------------------------

    const fundoMosaico = document.getElementById('fundo-mosaico');
    const totalCapas = 66;
    const repeticoes = 8;

    let listaCapas = Array.from({ length: totalCapas }, (_, i) => i + 1);

    function embaralhar(lista) {
        for (let i = lista.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [lista[i], lista[j]] = [lista[j], lista[i]];
        }
        return lista;
    }

    for (let i = 0; i < repeticoes; i++) {
        const capasAleatorias = embaralhar([...listaCapas]);
        capasAleatorias.forEach(numero => {
            const img = document.createElement('img');
            img.src = `./img/wallpapers/capa${numero}.jpg`;
            img.className = "w-full aspect-[2/3] object-cover rounded-xl shadow-md transition-all duration-700 hover:scale-110 hover:z-30 relative";
            img.alt = `Capa ${numero}`;
            fundoMosaico.appendChild(img);
        });
    }
</script>
<script src="./js/cadastro.js"></script>
</body>
</html>
