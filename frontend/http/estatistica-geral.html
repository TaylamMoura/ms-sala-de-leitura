<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="img/favicon.png" type="image/x-icon">
    <title>Meu Desempenho | Sala de Leitura</title>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'leitura-creme': '#FDFCF9',
                        'leitura-verde': '#638C6D',
                        'leitura-verde-escuro': '#4A6952',
                        'leitura-laranja': '#C84C05',
                    },
                    fontFamily: {
                        'titulo': ['"Special Elite"', 'system-ui'],
                        'mono': ['"Cutive Mono"', 'monospace'],
                        'principal': ['"Courier Prime"', 'serif'],
                        'livro': ['"Tenor Sans"', 'serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/css">
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Cutive+Mono&family=Courier+Prime:wght@400;700&family=Tenor+Sans&display=swap');

        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: #638C6D;
            border-radius: 10px;
        }
    </style>
</head>

<body class="bg-leitura-creme min-h-screen font-principal text-gray-800">

<header class="bg-white/70 backdrop-blur-md border-b border-gray-200 px-8 py-4 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-3">
        <img src="img/logotipo.png" alt="logotipo" class="w-10 h-10 rounded-full object-cover shadow-sm">
        <h2 class="font-titulo text-xl text-gray-900">Sala de Leitura</h2>
    </div>
    <a href="home.html" class="group flex items-center gap-2 font-mono text-sm hover:text-leitura-verde transition-colors">
        <img src="img/arrow_back.png" alt="Voltar" class="w-5 h-5 group-hover:-translate-x-1 transition-transform">
        Voltar
    </a>
</header>

<main class="max-w-6xl mx-auto px-6 py-12">
    <div class="text-center mb-16">
        <h1 class="font-titulo text-3xl text-gray-900 border-b-2 border-leitura-verde/20 inline-block pb-2">
            Minha Jornada de Leitura
        </h1>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">

        <div class="lg:col-span-3 flex flex-col items-center lg:items-start space-y-4">
            <h3 class="font-mono text-[14px] uppercase tracking-widest text-leitura-verde font-bold">Top Livros</h3>
            <div class="relative group">
                <div class="absolute -inset-2 bg-leitura-verde/10 rounded-[2rem] blur-xl opacity-50"></div>
                <img id="capaLivroPrincipal" src="img/capa-livro.png" alt="Capa Principal" class="relative w-full max-w-[220px] rounded-2xl shadow-2xl border-4 border-white transition-transform duration-500 group-hover:scale-[1.02]">
            </div>
            <div class="text-center lg:text-left pt-2">
                <h2 id="tituloLivroPrincipal" class="font-livro text-xl text-gray-900 leading-tight">...</h2>
                <p id="autorLivroPrincipal" class="font-mono text-sm text-gray-500 mt-1 italic">..</p>
            </div>
        </div>

        <div class="lg:col-span-4 space-y-6">
            <div id="livros-secundarios" class="space-y-4 max-h-[500px] overflow-y-auto pr-2 custom-scroll">
                <div class="flex items-center gap-4 p-3 bg-white/40 rounded-2xl border border-white hover:bg-white/60 transition-all group">
                    <img src="img/capa-livro.png" class="w-14 h-20 rounded-md shadow-md object-cover">
                    <div class="flex flex-col">
                        <span class="font-principal text-sm font-bold text-gray-800 leading-snug">...</span>
                        <span class="font-mono text-[11px] text-gray-500 italic">...</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-5 space-y-6">
            <h3 class="font-mono text-[12px] uppercase tracking-widest text-gray-400 font-bold text-center lg:text-left">
                Desempenho Geral
            </h3>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="bg-leitura-verde text-white p-5 rounded-[1.5rem] shadow-lg relative overflow-hidden group">
                    <img src="img/Clock.png" class="absolute -right-2 -bottom-2 w-16 h-16 opacity-20 invert group-hover:scale-110 transition-transform">
                    <p class="font-mono text-[10px] uppercase opacity-80 mb-2">Tempo Total</p>
                    <p class="text-lg font-bold"><span id="totalHorasLidas">...</span></p>
                </div>

                <div class="bg-white p-5 rounded-[1.5rem] border border-gray-100 shadow-sm flex items-center gap-4">
                    <div class="bg-leitura-creme p-3 rounded-full">
                        <img src="img/total-livros.png" class="w-6 h-6 opacity-70">
                    </div>
                    <div>
                        <p class="font-mono text-[10px] uppercase font-bold text-gray-400 tracking-wider">Livros Lidos</p>
                        <p class="text-xl font-bold text-gray-800" id="totalLivrosLidos">...</p>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-[1.5rem] border border-gray-100 shadow-sm flex items-center gap-4 sm:col-span-2">
                    <div class="bg-leitura-creme p-3 rounded-full">
                        <img src="img/paginas-2.png" class="w-6 h-6 opacity-70">
                    </div>
                    <div class="flex-1">
                        <p class="font-mono text-[11px] uppercase font-bold text-gray-400 tracking-wider">Páginas Lidas</p>
                        <p class="text-xl font-bold text-gray-800" id="totalPaginasLidas">... <span class="text-[10px] font-normal text-gray-400 uppercase">páginas</span></p>
                    </div>
                </div>

                <div class="bg-white/60 p-6 rounded-[1.5rem] border border-white shadow-inner sm:col-span-2 space-y-4">
                    <div class="flex items-center gap-2 border-b border-gray-100 pb-2">
                        <img src="img/Book.png" class="w-5 h-5 opacity-60">
                        <h4 class="font-mono text-[11px] uppercase font-bold text-gray-800 tracking-widest">Top Países</h4>
                    </div>

                    <div id="rankingPaisesContainer" class="space-y-3">
                        <div class="flex justify-between items-center text-sm p-2 rounded-xl bg-leitura-laranja/5 border border-leitura-laranja/10">
                                <span class="flex items-center gap-3">
                                    <span class="w-6 h-6 flex items-center justify-center bg-leitura-laranja text-white text-[12px] font-bold rounded-full shadow-sm">1º</span>
                                    <span class="font-bold text-gray-800">Carregando...</span>
                                </span>
                            <span class="font-mono text-xs text-leitura-laranja font-bold">...</span>
                        </div>

                        <div class="flex justify-between items-center text-sm p-2 rounded-xl bg-leitura-verde/10">
                                <span class="flex items-center gap-3">
                                    <span class="w-6 h-6 flex items-center justify-center bg-leitura-verde/30 text-leitura-verde-escuro text-[9px] font-bold rounded-full">2º</span>
                                    <span class="font-principal text-gray-700">Carregando...</span>
                                </span>
                            <span class="font-mono text-xs text-leitura-verde-escuro/70 font-bold">...</span>
                        </div>

                        <div class="flex justify-between items-center text-sm p-2 rounded-xl bg-leitura-laranja/5">
                                <span class="flex items-center gap-3">
                                    <span class="w-6 h-6 flex items-center justify-center bg-leitura-laranja/20 text-leitura-laranja text-[9px] font-bold rounded-full">3º</span>
                                    <span class="font-principal text-gray-700">Carregando...</span>
                                </span>
                            <span class="font-mono text-xs text-leitura-laranja/50 font-bold">...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="js/estatistica-geral.js"></script>
</body>

</html>
