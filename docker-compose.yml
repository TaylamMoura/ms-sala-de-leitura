version: '3.8'

services:
  # 1. Banco de Dados PostgreSQL (Infraestrutura Principal)
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD_POSTGRES}
      POSTGRES_DB: ${DB_NAME_AUTH} # O Docker cria apenas o DB do Auth na inicialização

    ports:
      - "5432:5432" # Expõe a porta para o MS-Auth rodando no IntelliJ
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persistência
      - ./init-db:/docker-entrypoint-initdb.d #Script de iniciação
    restart: always
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy: # Otimização de recursos (para o seu PC)
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # 2. COnsul Server (Infraestrutura Principal)
  consul-server:
    image: consul:1.15.4 # Imagem oficial, não precisa de código local
    container_name: consul-server
    command: agent -server -bootstrap-expect=1 -ui -node=server1 -client=0.0.0.0
    ports:
      - "8500:8500" # Porta da API e UI do Consul
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0' # Mantemos o limite para evitar sobrecarga
          memory: 350m
        reservations:
          cpus: '0.5'
          memory: 256m


  # 3. MS de Autenticação (Apenas para garantir que o Docker Compose saiba que ele existe)
  # Este serviço NÃO será iniciado aqui; ele será iniciado no IntelliJ.
  ms-auth:
    build:
      context: ./ms-auth
      dockerfile: Dockerfile
    container_name: ms-auth
    ports:
      - "8081:8081"
    # Adicione dependências temporárias para que o Maven Wrapper funcione globalmente
    # (Não rodaremos este contêiner, mas ele é útil para a compilação)
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/ms_auth

  # 4. MS do Catálogo (Não será iniciado agora)
  ms-catalog:
    build:
      context: ./ms-catalog
      dockerfile: Dockerfile
    container_name: ms-catalog #CONFIG QDO FOR RODAR NO DOCKER E NÃO LOCAL.

  # 5. MS das Sessões (Não será iniciado agora)
  ms-sessions:
    build:
      context: ./ms-sessions
      dockerfile: Dockerfile
    container_name: ms-sessions

  # 6. API Gateway
  ms-gateway:
    build:
      context: ./ms-gateway
      dockerfile: Dockerfile
    container_name: ms-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CLOUD_CONSUL_HOST=consul-server # Avisa ao Gateway que o Consul está no container
      - SPRING_CLOUD_CONSUL_PORT=8500
      - JWT_SECRET=${JWT_SECRET} # Repassando a variável de ambiente
    deploy: # Adicionando os limitadores como você pediu
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
      - consul-server
      - ms-auth
      - ms-catalog
      - ms-sessions

  # 7. Frontend (Nginx)
  frontend:
    build:
      context: ./frontend # Onde está seu Dockerfile e arquivos
    container_name: frontend
    ports:
      - "8085:80"
    volumes:
      - ./frontend/http:/usr/share/nginx/html
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

volumes:
  postgres_data: