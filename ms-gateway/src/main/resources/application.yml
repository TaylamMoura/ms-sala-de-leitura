server:
  port: 8080   # Porta do Gateway

spring:
  application:
    name: ms-gateway
  main:
    web-application-type: reactive
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        register: true
        prefer-ip-address: true
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: ms-auth
          uri: lb://ms-auth
          predicates:
            - Path=/usuarios/**, /ms-auth/v3/api-docs/**
        - id: ms-catalog
          uri: lb://ms-catalog
          predicates:
            - Path=/livros/**, /ms-catalog/v3/api-docs/**
        - id: ms-sessions
          uri: lb://ms-sessions
          predicates:
            - Path=/sessao-leitura/**, /estatisticas/**, /ms-sessions/v3/api-docs/**


management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Autenticação (ms-auth)
        url: /ms-auth/v3/api-docs
      - name: Catálogo (ms-catalog)
        url: /ms-catalog/v3/api-docs
      - name: Sessões (ms-sessions)
        url: /ms-sessions/v3/api-docs

---
spring:
  config:
    activate:
      on-profile: docker
  cloud:
    consul:
      host: host.docker.internal
      port: 8500
